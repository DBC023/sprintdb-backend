spring:
  application:
    name: sprintdb
  datasource:
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: postgres
    url:  jdbc:postgresql://localhost:5432/test
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
server:
  port: 8790
  servlet:
    context-path: /sprintdb

